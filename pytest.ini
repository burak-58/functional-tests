[pytest]
testpaths = tests
pythonpath = .
addopts = -ra -v
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)s %(name)s: %(message)s
markers =
    env: environment and connectivity checks from section 1
    rtmp: RTMP ingest checks from section 2
    webrtc: WebRTC ingest checks from section 3
    latency: browser playback and OCR latency checks
    stress: section 4 load tests
    slow: long-running tests
